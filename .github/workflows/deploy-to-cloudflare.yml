name: Deploy to Cloudflare Pages (OpenNext)

on:
  push:
    branches: ["perplexity/main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment:
      name: cloudflare
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Restore Next.js build cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx', 'content/**/*.mdx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - run: npm ci

      - name: Build (OpenNext)
        run: npx opennextjs-cloudflare build
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NEXT_TELEMETRY_DISABLED: 1

      - name: Prepare Pages deployment
        # Cloudflare Pages serves static assets and routes dynamic requests
        # through _worker.js. OpenNext's worker uses the same ASSETS binding
        # interface, so it is compatible as a Pages _worker.js.
        run: cp .open-next/worker.js .open-next/assets/_worker.js

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        id: deploy
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 62758afcaaf5e929beeac70e72312bc6
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy .open-next/assets --project-name lanark-house --branch ${{ github.ref_name }} --commit-hash ${{ github.sha }} --commit-message "${{ github.event.head_commit.message }}"
