<span role="img" aria-label="{{ include.rating }} out of 5 stars" class="star-rating">
  {% assign rating = include.rating | plus: 0 %}
  {% for i in (1..5) %}
    {% if i <= rating %}
      <span aria-hidden="true">★</span>
    {% else %}
      <span aria-hidden="true">☆</span>
    {% endif %}
  {% endfor %}
</span>
