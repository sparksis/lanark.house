{% assign rating = include.rating | default: 0 | plus: 0 %}
{% assign max_rating = 5 %}

<div class="star-rating" role="img" aria-label="{{ rating }} out of {{ max_rating }} stars">
  {% for i in (1..max_rating) %}
    <span aria-hidden="true" class="star">
      {% if i <= rating %}
        ★
      {% else %}
        ☆
      {% endif %}
    </span>
  {% endfor %}
</div>
