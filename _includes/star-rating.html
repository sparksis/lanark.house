<span class="star-rating" role="img" aria-label="{{ include.rating }} out of 5 stars">
  {% assign rating = include.rating | floor %}
  {% for i in (1..5) %}
    {% if i <= rating %}
      <span class="star star-filled" aria-hidden="true">★</span>
    {% else %}
      <span class="star star-empty" aria-hidden="true">☆</span>
    {% endif %}
  {% endfor %}
</span>
